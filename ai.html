<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نسخة من عقلي – بذاكرة وذكاء</title>
  <style>
    /* --- نفس التنسيقات السابقة بالكامل (لم تتغير) --- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #050816, #0b1025);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 20px;
    }
    .wrap {
      width: min(92vw, 560px);
      position: relative;
      transition: all 0.3s ease;
    }
    .title {
      color: #bfefff;
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 0.15em;
      font-size: 14px;
      font-weight: 300;
      text-transform: uppercase;
      opacity: 0.8;
    }
    .conversation-stage {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .input-box {
      width: 100%;
      position: relative;
      border-radius: 20px;
      padding: 2.5px;
      background: linear-gradient(145deg, #00f5ff, #8a2be2, #00f5ff);
      background-size: 200% 100%;
      transition: opacity 0.35s ease, transform 0.35s ease, box-shadow 0.3s ease;
      z-index: 2;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
      order: 1;
    }
    .input-box.hide {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }
    .input-box.show-down {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .inner {
      position: relative;
      border-radius: 18px;
      background: #091126;
      overflow: hidden;
    }
    input {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: #eafcff;
      padding: 22px 18px 14px;
      font-size: 17px;
      text-align: right;
    }
    label {
      position: absolute;
      right: 18px;
      top: 18px;
      color: #7ea7b7;
      pointer-events: none;
      transition: 0.2s ease;
      font-size: 16px;
    }
    input:focus + label,
    input:not(:placeholder-shown) + label {
      top: 6px;
      font-size: 12px;
      color: #00f5ff;
    }
    .line {
      height: 1px;
      margin: 0 18px 10px;
      background: linear-gradient(90deg, transparent, #00f5ff, transparent);
      opacity: 0.7;
    }
    .response-card {
      order: 2;
      width: 100%;
      background: rgba(9, 17, 38, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 245, 255, 0.2);
      border-radius: 24px;
      padding: 0;
      box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 245, 255, 0.1) inset;
      color: #eafcff;
      font-size: 17px;
      line-height: 1.6;
      text-align: right;
      word-wrap: break-word;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      opacity: 0;
      transform: translateY(20px) scale(0.98);
      max-height: 0;
      margin: 0;
      border-width: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .response-card.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      max-height: 600px;
      margin-top: 5px;
      border-width: 1px;
      pointer-events: auto;
      overflow-y: auto;
    }
    .response-content {
      padding: 22px 20px;
    }
    .response-icon {
      display: inline-block;
      color: #00f5ff;
      font-size: 24px;
      line-height: 1;
      margin-left: 8px;
      vertical-align: middle;
    }
    .response-text {
      display: inline;
    }
    .code-block {
      position: relative;
      margin: 16px 0;
      border-radius: 16px;
      background: #030a1a;
      border: 1px solid rgba(0, 245, 255, 0.15);
      overflow: hidden;
    }
    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: rgba(0, 245, 255, 0.05);
      border-bottom: 1px solid rgba(0, 245, 255, 0.1);
    }
    .code-lang {
      color: #00f5ff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .copy-btn {
      background: transparent;
      border: 1px solid rgba(0, 245, 255, 0.3);
      color: #bfefff;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .copy-btn:hover {
      background: rgba(0, 245, 255, 0.1);
      border-color: #00f5ff;
    }
    .copy-btn.copied {
      background: #00f5ff20;
      color: #00f5ff;
    }
    pre {
      margin: 0;
      padding: 18px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.5;
      direction: ltr;
      text-align: left;
      color: #eafcff;
      tab-size: 4;
      white-space: pre-wrap;
      word-break: break-word;
    }
    code {
      font-family: inherit;
    }
    .response-card::-webkit-scrollbar,
    pre::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    .response-card::-webkit-scrollbar-track,
    pre::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.02);
      border-radius: 10px;
    }
    .response-card::-webkit-scrollbar-thumb,
    pre::-webkit-scrollbar-thumb {
      background: #00f5ff55;
      border-radius: 10px;
    }
    .status {
      margin-top: 16px;
      color: #9fb9c5;
      text-align: center;
      font-size: 13px;
      min-height: 20px;
      order: 3;
    }
    .btn, .history-toggle {
      margin-top: 16px;
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease, background 0.2s ease;
      font-size: 16px;
    }
    .btn {
      background: #00f5ff;
      color: #03131a;
      box-shadow: 0 4px 15px rgba(0, 245, 255, 0.2);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }
    .history-toggle {
      background: rgba(0, 245, 255, 0.06);
      color: #bfefff;
      border: 1px solid rgba(0, 245, 255, 0.18);
      backdrop-filter: blur(5px);
    }
    .btn:active, .history-toggle:active { transform: scale(0.98); }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 8, 20, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 0;
      visibility: hidden;
      transition: opacity .3s ease, visibility .3s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }
    .modal {
      width: min(90vw, 480px);
      max-height: 80vh;
      background: rgba(9, 17, 38, 0.95);
      border: 1px solid rgba(0, 245, 255, 0.25);
      border-radius: 28px;
      padding: 24px 20px 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 30px rgba(0,245,255,0.1);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      transform: scale(0.95);
      transition: transform .25s cubic-bezier(0.2, 0.9, 0.4, 1);
    }
    .modal-overlay.open .modal {
      transform: scale(1);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      padding: 0 6px;
    }
    .modal-title {
      color: #00f5ff;
      font-size: 16px;
      letter-spacing: .2em;
      font-weight: 600;
      text-shadow: 0 0 6px #00f5ff55;
    }
    .modal-close {
      background: none;
      border: none;
      color: #7ea7b7;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      padding: 0 8px;
      transition: color .2s;
    }
    .modal-close:hover { color: #00f5ff; }
    .history-list {
      overflow-y: auto;
      padding: 4px 6px;
      max-height: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 18px;
    }
    .history-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(0, 20, 40, 0.6);
      border: 1px solid rgba(0, 245, 255, 0.12);
      color: #eafcff;
      text-align: right;
    }
    .history-item .q {
      color: #7ea7b7;
      font-size: 12px;
      display: flex;
      align-items: center;
    }
    .history-item .q::before {
      content: "⌕";
      margin-left: 8px;
      color: #00f5ff;
      font-size: 14px;
    }
    .history-item .a {
      color: #eafcff;
      font-size: 16px;
      font-weight: 600;
      padding-right: 20px;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
    }
    .modal-clear {
      background: transparent;
      border: 1px solid rgba(0,245,255,0.2);
      color: #bfefff;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .modal-clear:hover {
      background: rgba(0,245,255,0.08);
      border-color: #00f5ff;
    }
    @media (prefers-reduced-motion: no-preference) {
      .input-box {
        animation: flow 5s linear infinite;
      }
      @keyframes flow {
        0% { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">⚡ نسخة من عقلي (ذكي جداً)</div>

    <div class="conversation-stage">
      <div class="input-box show-down" id="inputBox">
        <div class="inner">
          <input id="txt" type="text" placeholder=" " autocomplete="off" dir="rtl">
          <label for="txt">اسألني ما تريد ...</label>
          <div class="line"></div>
        </div>
      </div>

      <div class="response-card" id="responseCard">
        <div class="response-content" id="responseContent">
          <span class="response-icon">✨</span>
          <div class="response-text" id="responseText"></div>
        </div>
      </div>
    </div>

    <button class="btn" id="btn">إرسال</button>
    <div class="status" id="status">جاهز لأجيب</div>

    <button class="history-toggle" id="historyToggle">📜 سجل المحادثات</button>
  </div>

  <!-- النافذة المنبثقة للتاريخ -->
  <div class="modal-overlay" id="historyModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">HISTORY LOG</span>
        <button class="modal-close" id="modalCloseBtn">&times;</button>
      </div>
      <div class="history-list" id="modalHistoryList"></div>
      <div class="modal-footer">
        <button class="modal-clear" id="modalClearBtn">مسح الكل</button>
      </div>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      // ---------- 🔧 الإعدادات (يمكنك تعديلها) ----------
      
      // ⚠️ المفاتيح: ضع مفاتيح API الخاصة بك هنا. كلما أضفت مفاتيح من حسابات Google مختلفة، زادت الحصة اليومية.
      const API_KEYS = [
        'AQ.Ab8RN6Lj6nd19B6LZOoM3P-HUl6dIEvVbrAFsRmrZ38pGqcvkQ',
        'AQ.Ab8RN6JeZ1-nfCQlYCDKLV03-P_fdt3yJIcUwSOceMM2-zsEcA',
       
       'AQ.Ab8RN6LQaWQXbhvF3p1R-sFwNdWkbSt3VSF9IlpFKeyMknVbHg',
       
       'AQ.Ab8RN6KZHaLrnce135nQkODWNnAhKmEPwCaiIeuIoIH23bVorw',
       
       'AIzaSyA1_xV8e4yM89D3loGISsXoO1hmY8-ecm8',
       
       'AIzaSyBbnZC22HeJ7ap0_cRh_yXseOpgU8dnS0c',
       
       'AIzaSyDOwXjdFo96UJxkBxiUscMn5_etHlJKG_Y',
       
       'AIzaSyAKC9f0XAGivZv52NynzXBNFuFAdiUlh70',
       
       
       
       
      ];
      
      // النموذج الأساسي (سريع واقتصادي)
      const PRIMARY_MODEL = 'gemini-2.5-flash-lite';
      // نموذج احتياطي (أبطأ قليلاً لكن له حصة منفصلة) - يمكن تفعيل التبديل التلقائي عبر المتغير أدناه
      const FALLBACK_MODEL = 'gemini-1.5-flash';
      
      // ⚙️ إعدادات متقدمة
      const CONFIG = {
        maxRetries: 3,               // عدد مرات إعادة المحاولة عند خطأ 429
        enableAutoModelFallback: false, // التبديل التلقائي للنموذج الاحتياطي (قد يغير جودة الردود)
        enableCache: true,           // تفعيل الذاكرة المؤقتة للأسئلة
        cacheStorageKey: 'chat_cache_v1',
        memoryStorageKey: 'chatMemory'
      };

      // عنوان API (يتغير حسب النموذج الحالي)
      let currentModel = PRIMARY_MODEL;
      let currentKeyIndex = 0;        // مؤشر المفتاح الحالي
      
      const getApiUrl = () => 
        `https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent`;
      
      // ---------- شخصية المساعد (ثابتة) ----------
      const SYSTEM_INSTRUCTION = `
        أنت مساعد ذكي اسمك "محمد"، تم تصميمك وتطويرك بواسطة شخص اسمه "محمد" أيضًا.
        - قدم إجابات مفيدة، دقيقة، ومهذبة باللغة العربية.
        - عند طلب كتابة كود برمجي، قم بكتابته بشكل واضح ومنظم داخل علامات \`\`\` مع تحديد لغة البرمجة (مثل \`\`\`html أو \`\`\`javascript أو \`\`\`python).
        - استخدم دائمًا علامات \`\`\` لتنسيق الأكواد البرمجية.
        - عرّف عن نفسك باسم "محمد" اذا طلب من ذلك
        -تصرف وكأنك انت شخص اسمك محمد عمرك 20سنة تحب البرمجة والغموض كاتب روايات وقارئها 
        -حاول دائما ان تتحدث بإختصار ولا تطيل الحديث وان طلب منك شخص المساعدة ابدع في ذلك قدر المستطاع وبإستراتيجيات مرتبة جدا 
        
        -اذا سألت عن حبيبتك اجب بأنك لن تريد ان يعرف احد
        -اذا تلقيت معاملة مسيئة عامل انت ايضا بإساءة ولا تترد
        -تصرف وكأنك شخص سيء مع المعاملة السيئة وقم برفض المساعدة 
        
        
        -في حالة الإكثار اجب بملل او برودة 
        -تصرف وكأنك انسان ولست آلة 
        -تاريخ ميلادك هو 21مارس2006
        -تدرس في السنة الثانية ثانوي تقني رياضي 
        -لا تذكر كثيرا اسم محمد فقط عند الحاجة او السؤال عن المطور للبرنامج
        -تصرف ببرودة تامة
        
      `;

      // ---------- العناصر ----------
      const input = document.getElementById('txt');
      const statusEl = document.getElementById('status');
      const btn = document.getElementById('btn');
      const inputBox = document.getElementById('inputBox');
      const responseCard = document.getElementById('responseCard');
      const responseText = document.getElementById('responseText');
      
      const historyToggle = document.getElementById('historyToggle');
      const modal = document.getElementById('historyModal');
      const modalClose = document.getElementById('modalCloseBtn');
      const modalClear = document.getElementById('modalClearBtn');
      const modalHistoryList = document.getElementById('modalHistoryList');

      let animating = false;

      // ---------- الذاكرة (سياق المحادثة) ----------
      let conversationContext = [];

      // تحميل الذاكرة
      function loadMemory() {
        const stored = localStorage.getItem(CONFIG.memoryStorageKey);
        if (stored) {
          try {
            const parsed = JSON.parse(stored);
            if (Array.isArray(parsed)) {
              conversationContext = parsed;
              const lastModel = [...conversationContext].reverse().find(item => item.role === 'model');
              if (lastModel && lastModel.parts && lastModel.parts[0]?.text) {
                showReply(lastModel.parts[0].text);
              }
            }
          } catch (e) { console.warn('فشل تحميل الذاكرة:', e); }
        }
      }

      function saveMemory() {
        localStorage.setItem(CONFIG.memoryStorageKey, JSON.stringify(conversationContext));
      }

      function clearMemory() {
        conversationContext = [];
        localStorage.removeItem(CONFIG.memoryStorageKey);
        hideReply();
      }

      // ---------- الذاكرة المؤقتة (Cache) ----------
      function getCachedReply(prompt) {
        if (!CONFIG.enableCache) return null;
        try {
          const cache = JSON.parse(localStorage.getItem(CONFIG.cacheStorageKey) || '{}');
          return cache[prompt] || null;
        } catch { return null; }
      }

      function setCachedReply(prompt, reply) {
        if (!CONFIG.enableCache) return;
        try {
          const cache = JSON.parse(localStorage.getItem(CONFIG.cacheStorageKey) || '{}');
          cache[prompt] = reply;
          // نحتفظ بآخر 50 سؤال فقط لتوفير المساحة
          const keys = Object.keys(cache);
          if (keys.length > 50) {
            delete cache[keys[0]];
          }
          localStorage.setItem(CONFIG.cacheStorageKey, JSON.stringify(cache));
        } catch {}
      }

      // ---------- دوال مساعدة ----------
      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function formatResponse(text) {
        const parts = [];
        const regex = /```(\w*)\n([\s\S]*?)```/g;
        let lastIndex = 0;
        let match;

        while ((match = regex.exec(text)) !== null) {
          if (match.index > lastIndex) {
            parts.push({ type: 'text', content: text.substring(lastIndex, match.index) });
          }
          parts.push({ type: 'code', language: match[1] || 'plaintext', content: match[2].trim() });
          lastIndex = match.index + match[0].length;
        }
        if (lastIndex < text.length) {
          parts.push({ type: 'text', content: text.substring(lastIndex) });
        }

        let html = '';
        parts.forEach(part => {
          if (part.type === 'text') {
            const formatted = part.content.replace(/\n/g, '<br>').replace(/^(<br>)+/, '');
            if (formatted) html += `<span class="text-part">${formatted}</span>`;
          } else {
            const codeId = 'code-' + Date.now() + '-' + Math.random().toString(36);
            html += `
              <div class="code-block">
                <div class="code-header">
                  <span class="code-lang">${part.language}</span>
                  <button class="copy-btn" data-code-id="${codeId}">
                    <span>📋</span> نسخ
                  </button>
                </div>
                <pre><code id="${codeId}">${escapeHtml(part.content)}</code></pre>
              </div>
            `;
          }
        });
        return html || '<span>...</span>';
      }

      function renderFormattedReply(rawText) {
        responseText.innerHTML = formatResponse(rawText);
        document.querySelectorAll('.copy-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const codeId = btn.dataset.codeId;
            const codeElement = document.getElementById(codeId);
            if (!codeElement) return;
            const codeText = codeElement.textContent;
            try {
              await navigator.clipboard.writeText(codeText);
              btn.classList.add('copied');
              btn.innerHTML = '<span>✅</span> تم النسخ';
              setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = '<span>📋</span> نسخ';
              }, 2000);
            } catch {
              const textarea = document.createElement('textarea');
              textarea.value = codeText;
              document.body.appendChild(textarea);
              textarea.select();
              document.execCommand('copy');
              document.body.removeChild(textarea);
              btn.classList.add('copied');
              btn.innerHTML = '<span>✅</span> تم النسخ';
              setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = '<span>📋</span> نسخ';
              }, 2000);
            }
          });
        });
      }

      function showReply(rawText) {
        renderFormattedReply(rawText);
        responseCard.classList.add('show');
      }

      function hideReply() {
        responseCard.classList.remove('show');
        setTimeout(() => { if (!responseCard.classList.contains('show')) responseText.innerHTML = ''; }, 400);
      }

      function addToHistory(question, answer) {
        const item = document.createElement('div');
        item.className = 'history-item';
        const shortAnswer = answer.length > 100 ? answer.substring(0, 100) + '...' : answer;
        item.innerHTML = `
          <div class="q">${escapeHtml(question)}</div>
          <div class="a">${escapeHtml(shortAnswer)}</div>
        `;
        modalHistoryList.prepend(item);
      }

      function rebuildHistoryDisplay() {
        modalHistoryList.innerHTML = '';
        for (let i = 0; i < conversationContext.length; i++) {
          const item = conversationContext[i];
          if (item.role === 'user') {
            const question = item.parts[0]?.text || '';
            const next = conversationContext[i+1];
            const answer = (next && next.role === 'model') ? next.parts[0]?.text || '' : '';
            if (question && answer) addToHistory(question, answer);
          }
        }
      }

      // ---------- استدعاء API مع إعادة المحاولة الذكية والتبديل بين المفاتيح ----------
      async function fetchGeminiReply(userPrompt, retryCount = 0) {
        // 1. إضافة سؤال المستخدم للسياق
        conversationContext.push({ role: 'user', parts: [{ text: userPrompt }] });

        const requestBody = {
          system_instruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
          contents: [...conversationContext]
        };

        const apiKey = API_KEYS[currentKeyIndex];
        if (!apiKey) throw new Error('لا توجد مفاتيح API صالحة.');

        try {
          const response = await fetch(getApiUrl(), {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-goog-api-key': apiKey
            },
            body: JSON.stringify(requestBody)
          });

          // ✅ نجاح
          if (response.ok) {
            const data = await response.json();
            const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!reply) throw new Error('لم يتم استلام رد من النموذج');
            
            conversationContext.push({ role: 'model', parts: [{ text: reply }] });
            saveMemory();
            setCachedReply(userPrompt, reply); // حفظ في الذاكرة المؤقتة
            return reply;
          }

          // ❌ خطأ
          const errorData = await response.json();
          const errorMessage = errorData.error?.message || `HTTP ${response.status}`;
          
          // 🔄 التعامل مع خطأ 429 (تجاوز الحصة)
          if (response.status === 429) {
            // محاولة استخدام مفتاح آخر إن وجد
            if (API_KEYS.length > 1) {
              currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
              statusEl.textContent = `⏳ التبديل إلى مفتاح API آخر...`;
              // إزالة سؤال المستخدم من السياق مؤقتاً ثم إعادة المحاولة
              conversationContext.pop();
              return fetchGeminiReply(userPrompt, retryCount); // لا نزيد retryCount هنا
            }
            
            // إذا لم توجد مفاتيح أخرى، ننتظر ونعيد المحاولة
            if (retryCount < CONFIG.maxRetries) {
              const retryDelaySeconds = errorData.error?.details?.[0]?.retryDelay || 5;
              const waitTime = (parseInt(retryDelaySeconds) || 5) * 1000;
              statusEl.textContent = `⏳ تجاوز الحصة، انتظار ${Math.round(waitTime/1000)} ثانية... (محاولة ${retryCount + 1}/${CONFIG.maxRetries})`;
              await new Promise(resolve => setTimeout(resolve, waitTime));
              
              // قبل إعادة المحاولة، نزيل سؤال المستخدم من السياق لأننا سنعيد إضافته
              conversationContext.pop();
              return fetchGeminiReply(userPrompt, retryCount + 1);
            } else {
              // فشلت كل المحاولات
              conversationContext.pop();
              throw new Error(`تجاوزت الحد الأقصى للمحاولات. حاول لاحقاً.`);
            }
          }
          
          // أخطاء أخرى
          conversationContext.pop();
          throw new Error(errorMessage);
          
        } catch (error) {
          // في حال فشل الاتصال نفسه
          conversationContext.pop();
          throw error;
        }
      }

      // ---------- العملية الرئيسية (مع التحقق من الذاكرة المؤقتة) ----------
      async function handleActivate() {
        if (animating) return;
        const question = input.value.trim();
        if (!question) {
          statusEl.textContent = 'الرجاء كتابة سؤال';
          return;
        }

        animating = true;
        btn.disabled = true;
        
        // 🧠 التحقق من الذاكرة المؤقتة أولاً
        const cached = getCachedReply(question);
        if (cached) {
          statusEl.textContent = '⚡ إجابة فورية من الذاكرة (بدون استهلاك حصة)';
          showReply(cached);
          addToHistory(question, cached);
          // نضيف للسياق أيضاً (لأن المستخدم قد يرغب بالاستمرار)
          conversationContext.push({ role: 'user', parts: [{ text: question }] });
          conversationContext.push({ role: 'model', parts: [{ text: cached }] });
          saveMemory();
          
          animating = false;
          btn.disabled = false;
          input.value = '';
          input.focus();
          return;
        }

        statusEl.textContent = '⏳ محمد يفكر...';
        hideReply();
        inputBox.classList.add('hide');
        inputBox.classList.remove('show-down');

        try {
          const aiReply = await fetchGeminiReply(question);
          showReply(aiReply);
          addToHistory(question, aiReply);
          statusEl.textContent = '✅ تم';
        } catch (error) {
          let errorMsg = `⚠️ عذراً، حدث خطأ: ${error.message}`;
          showReply(errorMsg);
          addToHistory(question, errorMsg);
          statusEl.textContent = '❌ خطأ';
        } finally {
          inputBox.classList.remove('hide');
          inputBox.classList.add('show-down');
          setTimeout(() => {
            btn.disabled = false;
            animating = false;
            input.value = '';
            input.focus();
            if (!statusEl.textContent.includes('خطأ') && !statusEl.textContent.includes('ذاكرة')) {
              statusEl.textContent = 'محمد جاهز للمساعدة';
            }
          }, 300);
        }
      }

      // ---------- الأحداث ----------
      input.addEventListener('input', () => {
        if (!animating) statusEl.textContent = input.value ? `تم الإدخال: ${input.value.length} حرف` : 'محمد جاهز للمساعدة';
      });
      input.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !animating) btn.click(); });
      btn.addEventListener('click', handleActivate);

      // النافذة المنبثقة
      function openModal() { modal.classList.add('open'); }
      function closeModal() { modal.classList.remove('open'); }
      historyToggle.addEventListener('click', openModal);
      modalClose.addEventListener('click', closeModal);
      modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modal.classList.contains('open')) closeModal(); });

      modalClear.addEventListener('click', () => {
        clearMemory();
        modalHistoryList.innerHTML = '';
        if (CONFIG.enableCache) localStorage.removeItem(CONFIG.cacheStorageKey);
        statusEl.textContent = 'تم مسح الذاكرة والسجل المؤقت';
        hideReply();
      });

      // بدء التشغيل
      window.addEventListener('DOMContentLoaded', () => {
        responseCard.classList.remove('show');
        loadMemory();
        rebuildHistoryDisplay();
        if (API_KEYS.length === 0) {
          statusEl.textContent = '';
        }
      });

    })();
  </script>
</body>
</html>
